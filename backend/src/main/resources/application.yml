spring:
  datasource:
    url: jdbc:h2:mem:servicehub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8080

jwt:
  secret: servicehub-secret-key-2026-strong-32bytes
  expiration-ms: 86400000
